<!DOCTYPE html>
<html>
<head>
  <title>Sangavi & Lokesh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 💌 ENVELOPE -->
<div class="envelope" onclick="openInvite()">
  <div class="letter">
    <p>Tap to Open</p>
  </div>
</div>

<!-- 🎼 MUSIC BUTTON -->
<button class="music-btn" onclick="playMusic()">🎼</button>
<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🌸 PETALS -->
<div id="petals-container"></div>

<!-- MAIN CONTENT -->
<div id="main" class="hidden">

  <section class="hero">
    <h1>Sangavi & Lokesh</h1>
    <p>May 25, 2026</p>
  </section>

  <section class="countdown">
    <h2>Countdown</h2>
    <p id="timer"></p>
  </section>

  <section class="events">

    <div class="event">
      <h3>Reception</h3>
      <a href="YOUR_RECEPTION_MAP" target="_blank">📍 Navigate</a>
    </div>

    <div class="event">
      <h3>Muhurtham</h3>
      <a href="YOUR_MUHURTHAM_MAP" target="_blank">📍 Navigate</a>
    </div>

  </section>

</div>

<script>

// 💌 OPEN ENVELOPE
function openInvite() {
  document.querySelector('.envelope').style.display = 'none';
  document.getElementById('main').classList.remove('hidden');
}

// 🎼 MUSIC
function playMusic() {
  document.getElementById('bg-music').play();
}

// ⏳ COUNTDOWN (FIXED)
const weddingDate = new Date("May 25, 2026 09:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = weddingDate - now;

  let days = Math.floor(gap / (1000 * 60 * 60 * 24));
  let hours = Math.floor((gap / (1000 * 60 * 60)) % 24);
  let minutes = Math.floor((gap / (1000 * 60)) % 60);

  document.getElementById("timer").innerHTML =
    days + "d " + hours + "h " + minutes + "m";
}, 1000);

// 🌸 PETALS (FIXED)
setInterval(() => {
  let petal = document.createElement("div");
  petal.classList.add("petal");

  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.getElementById("petals-container").appendChild(petal);

  setTimeout(() => petal.remove(), 5000);
}, 300);

</script>

</body>
</html>
