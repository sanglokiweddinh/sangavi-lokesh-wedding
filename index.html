<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sangavi ❤️ Lokesh</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- 💌 ENVELOPE -->
<div class="envelope" id="envelope">
  <div class="flap"></div>
  <div class="letter">Tap to Open 💌</div>
</div>

<!-- 🌸 MAIN CONTENT -->
<div id="main" class="hidden">

  <!-- HERO -->
  <section class="hero">
    <h1>Sangavi & Lokesh</h1>
    <p>May 25, 2026</p>
  </section>

  <!-- 🎵 SPOTIFY PLAYER -->
  <div class="player">
    <img src="couple.jpg" class="cover">

    <div class="info">
      <h3>Wildest Dreams</h3>
      <p>Bridgerton Violin</p>

      <button id="playBtn">▶</button>
    </div>
  </div>

  <!-- EVENTS -->
  <section class="events">

    <div class="card">
      <h3>Muhurtham</h3>
      <p>9:00 AM – 10:30 AM</p>
      <a href="YOUR_MUHURTHAM_MAP" target="_blank">📍 Navigate</a>
    </div>

    <div class="card">
      <h3>Reception</h3>
      <p>7 PM onwards</p>
      <a href="YOUR_RECEPTION_MAP" target="_blank">📍 Navigate</a>
    </div>

  </section>

</div>

<!-- 🎼 MUSIC -->
<audio id="music">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// 💌 Envelope open
document.getElementById("envelope").addEventListener("click", () => {
  let env = document.getElementById("envelope");

  env.classList.add("open");

  setTimeout(() => {
    env.style.display = "none";
    document.getElementById("main").classList.remove("hidden");
  }, 1200);
});

// 🎵 Music play
const music = document.getElementById("music");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
    btn.innerHTML = "⏸";
  } else {
    music.pause();
    btn.innerHTML = "▶";
  }
});

</script>

</body>
</html>
